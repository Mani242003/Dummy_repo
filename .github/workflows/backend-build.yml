name: Backend Build Pipeline

on:
  workflow_call:
    inputs:
      relordev: { type: string, required: true }
      relno: { type: string, required: true }
      branchName: { type: string, required: true }
      buildimage: { type: string, required: true }
      uploadimage: { type: string, required: true }
      environment: { type: string, required: true }
      runner: { type: string, required: true }

jobs:
  validate:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Validate Inputs
        run: |
          echo "=== BACKEND BUILD ==="
          echo "relordev: ${{ inputs.relordev }}"
          echo "relno: ${{ inputs.relno }}"
          echo "branchName: ${{ inputs.branchName }}"
          echo "buildimage: ${{ inputs.buildimage }}"
          echo "uploadimage: ${{ inputs.uploadimage }}"
          echo "environment: ${{ inputs.environment }}"

  build-jar:
    needs: validate
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Build JAR
        run: echo "Simulating JAR build..."

  docker:
    needs: build-jar
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Build Docker Image
        run: echo "Simulating Docker build..."

  cleanup:
    needs: docker
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Cleanup
        run: echo "Cleanup completed"
