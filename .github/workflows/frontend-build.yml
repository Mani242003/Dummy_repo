name: Frontend Build Pipeline

on:
  workflow_call:
    inputs:
      relordev: { type: string, required: true }
      relno: { type: string, required: true }
      branchName: { type: string, required: true }
      buildimage: { type: string, required: true }
      uploadimage: { type: string, required: true }
      environment: { type: string, required: true }

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== FRONTEND BUILD ==="
          echo "${{ inputs.relordev }}"
          echo "${{ inputs.relno }}"
          echo "${{ inputs.branchName }}"

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building frontend..."

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docker build..."

  cleanup:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - run: echo "Cleanup done"
